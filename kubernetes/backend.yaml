apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: wanderlust
  labels:
    app: backend
    owner: devendra532  # Personalized label
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
        managed-by: devendra532  # Added label for personalization
    spec:
      containers:
        - name: backend
          image: trainwithshubham/wanderlust-backend-beta:v2.1  # Using Shubham's Docker image
          ports:
            - containerPort: 8080
          env:
            - name: OWNER
              value: "devendra532"  # Example: Personalizing environment variables
            - name: DEPLOYED_BY
              value: "TDevendra532"  # Added your GitHub username
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: wanderlust
  labels:
    service-owner: devendra532  # Custom label for tracking
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      nodePort: 31100
